[features.auth]
enabled = true

[features.tenant]
enabled = true

[features.rbac]
enabled = true

[features.audit]
enabled = true

[features.storage]
enabled = true

[features.cache]
enabled = true

[features.queue]
enabled = true

[features.scheduler]
enabled = true

[features.payment]
enabled = false

[features.notify]
enabled = false

[providers]
storage = "r2"
cache = "redis"
queue = "bullmq"

[auth]
baseUrl = "http://localhost:3000"

[db]
url = ""

[redis]
url = ""

[queue]
defaultQueueName = "default"

[scheduler]
heartbeatCron = "*/5 * * * *"

[payment]
provider = "none"

[notify]
emailProvider = "none"
smsProvider = "none"

[storage.r2]
bucket = "dev-bucket"
endpoint = "http://127.0.0.1:9000"

[storage.oss]
region = ""
bucket = ""
